version: "3.8"

services:
  homebox:
    image: ghcr.io/hay-kot/homebox:latest
    container_name: homebox
    restart: unless-stopped
    environment:
      - HBOX_LOG_LEVEL=info
      - HBOX_LOG_FORMAT=text
      - HBOX_WEB_MAX_UPLOAD_SIZE=100
      # Uncomment and set to enable HTTPS
      # - HBOX_WEB_TLS_CERT=/certs/cert.pem
      # - HBOX_WEB_TLS_KEY=/certs/key.pem
    ports:
      - "3100:7745"
    volumes:
      - homebox-data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7745/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  homebox-data:
    driver: local
